                        style="background:none;border:none;cursor:pointer;font-size:16px;padding:0;line-height:1"
                        >${item.favorite ? '★' : '☆'}</button>`;
                    return `<tr>
                        <td style="text-align:center">${starBtn}</td>
                        <td class="url-cell">${sourceLink}</td>
                        <td>${ratingBadge(item.rating)}</td>
                        <td>${item.post_date ? fmtDate(item.post_date) : '—'}</td>
                        <td>${fmtDate(item.created_at)}</td>
                        <td>${sourceCell}</td>
                        <td>${tagCell}</td>
                    </tr>`;
                }).join('');

                const pagination = `
                    ${perPageSelect(contentPerPage, 'contentSetPerPage')}
                    <span>Page ${contentPage} of ${totalPages || 1}</span>
                    <button onclick="contentGoPage(${contentPage - 1})" ${hasPrev ? '' : 'disabled'}>← Prev</button>
                    <button onclick="contentGoPage(${contentPage + 1})" ${hasNext ? '' : 'disabled'}>Next →</button>`;

                const tbody = pane.querySelector('tbody[data-id="content-tbody"]');
                if (silent && tbody) {
                    tbody.innerHTML = rows || '<tr><td colspan="7" class="empty">No content yet</td></tr>';

                    if (pg) pg.innerHTML = pagination;
                    const cnt = pane.querySelector('[data-id="content-count"]');
                    if (cnt) cnt.textContent = `${data.total_count} ${contentSearch ? 'matching' : 'total'}`;
                    pane.querySelectorAll('thead th.sortable').forEach((th, i) => {
                        const key = CONTENT_COLUMNS[i]?.key;
                        if (!key) return;
                        th.className = 'sortable' + (contentSort === key ? ` sort-${contentSortDir}` : '') + (key === 'favorite' ? '' : '');
                        if (key === 'favorite') th.style.cssText = 'width:32px;text-align:center';
                    });
                } else {
                    pane.innerHTML = `
                        <div class="section-header">
                            <h2>Content <span class="meta" data-id="content-count">${data.total_count} ${contentSearch ? 'matching' : 'total'}</span></h2>
                            <div style="display:flex;gap:8px;align-items:center;">
                                <input type="search" placeholder="Search content…" value="${esc(contentSearch)}"
                                    oninput="onContentSearch(this.value)"
                                    style="padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;width:220px;">
                                <button class="refresh-btn" onclick="loadContent(false)">Refresh</button>
                            </div>
                        </div>
                        <table>
                            <thead><tr>${theads}</tr></thead>
                            <tbody data-id="content-tbody">${rows || '<tr><td colspan="7" class="empty">No content yet</td></tr>'}</tbody>
                        </table>
                        <div class="pagination" data-id="content-pagination">${pagination}</div>`;
                }
            } catch (e) {
                if (!silent) pane.innerHTML = `<div class="error">Failed to load content: ${esc(e.message)}</div>`;
            }
        }

        // ── Home tab ──────────────────────────────────────────────────────────
        const HOME_PAGE_SIZE = 40;
        let homeOffset = 0;
        let homeLoading = false;
        let homeItemCount = 0; // total items distributed across columns so far
        let homeColWidth = parseInt(localStorage.getItem('homeColWidth') || '220');

        const THUMB_ICON = { image: '🖼', video: '🎬', audio: '🎵', document: '📄' };
        function fileTypeIcon(filePath) {
            const ext = (filePath || '').split('.').pop().toLowerCase();
            if ('jpg jpeg png gif webp bmp tiff avif'.includes(ext)) return THUMB_ICON.image;
            if ('mp4 webm mkv avi mov flv'.includes(ext)) return THUMB_ICON.video;
            if ('mp3 flac ogg wav aac opus'.includes(ext)) return THUMB_ICON.audio;
            if ('pdf cbz cbr epub'.includes(ext)) return THUMB_ICON.document;
            return '📁';
        }

        const VIDEO_EXTS = new Set(['mp4', 'webm', 'mkv', 'avi', 'mov', 'flv']);

        // Compute how many columns fit given the current main-content width and column width setting.
        function getHomeColCount() {
            const w = (document.querySelector('main')?.clientWidth ?? 900) - 48;
            return Math.max(1, Math.floor(w / homeColWidth));
        }

        // Re-distribute already-rendered items into a new column count without re-fetching.
        function reshomeColumns(colCount) {
            const masonry = document.querySelector('[data-id="home-masonry"]');
            if (!masonry) return;
            const items = Array.from(masonry.querySelectorAll('.home-masonry-item'));
            if (!items.length) return;
            masonry.innerHTML = Array.from({ length: colCount }, () =>
                '<div class="home-masonry-col"></div>'
            ).join('');
            const cols = masonry.querySelectorAll('.home-masonry-col');
            items.forEach((item, i) => cols[i % colCount].appendChild(item));
            homeItemCount = items.length;
        }

        function onHomeSlider(value) {
            homeColWidth = parseInt(value);
            localStorage.setItem('homeColWidth', homeColWidth);
            reshomeColumns(getHomeColCount());
        }

        // Render a single masonry item as an HTML string.
        function renderOneHomeCard(item) {
            const ext = (item.file_path || '').split('.').pop().toLowerCase();
            const icon = fileTypeIcon(item.file_path);
            const isVideo = VIDEO_EXTS.has(ext);
            const isGif   = ext === 'gif';
            const id      = esc(item.id);
            const fallback = `<div class=\\'home-masonry-placeholder\\'>${icon}</div>`;
            let media;
            if (isVideo) {
                media = `<video src="/content/${id}/file"
                    poster="/content/${id}/thumbnail"
                    muted loop playsinline preload="none"
                    onmouseenter="this.play()"
                    onmouseleave="this.pause();this.currentTime=0"></video>`;
            } else if (isGif) {
                media = `<img src="/content/${id}/file" loading="lazy" alt=""
                    onerror="this.outerHTML='${fallback}'">`;
            } else {
                media = `<img src="/content/${id}/thumbnail" loading="lazy" alt=""
                    onerror="this.outerHTML='${fallback}'">`;
            }
            const inner = item.source_url
                ? `<a href="${esc(item.source_url)}" target="_blank" rel="noopener">${media}</a>`
                : media;
            return `<div class="home-masonry-item">${inner}</div>`;
        }

        // Append items into the explicit column divs in round-robin order.
        // Each item is inserted at the end of its target column — nothing else moves.
        function appendHomeItems(masonry, items) {
            const cols = masonry.querySelectorAll('.home-masonry-col');
            const n = cols.length;
            if (!n || !items.length) return;
            items.forEach((item, i) => {
                cols[(homeItemCount + i) % n].insertAdjacentHTML('beforeend', renderOneHomeCard(item));
            });
            homeItemCount += items.length;
        }

        async function loadHome(silent = false) {
            const pane = document.getElementById('home');

            // Silent auto-refresh: only update the count badge; leave the grid alone.
            if (silent) {
                try {
                    const data = await fetch('/content?sort_by=created_at&sort_dir=desc&page=1&per_page=1').then(r => r.json());
                    const cnt = pane.querySelector('[data-id="home-count"]');
                    if (cnt) cnt.textContent = `${data.total_count} total`;
                } catch (_) {}
                return;
            }

            pane.innerHTML = '<div class="loading">Loading…</div>';
            homeOffset = 0;
            homeItemCount = 0;
            try {
                const params = new URLSearchParams({ sort_by: 'created_at', sort_dir: 'desc', page: 1, per_page: HOME_PAGE_SIZE });
                const data = await fetch(`/content?${params}`).then(r => r.json());
                homeOffset = (data.content || []).length;
                const hasMore = data.total_count > homeOffset;

                // Build explicit column divs so future appends never re-flow existing items
                const colCount = getHomeColCount();
                const colDivs = Array.from({ length: colCount }, () =>
                    '<div class="home-masonry-col"></div>'
                ).join('');

                pane.innerHTML = `
                    <div class="section-header">
                        <h2>Recent Content <span class="meta" data-id="home-count">${data.total_count} total</span></h2>
                        <div style="display:flex;align-items:center;gap:8px">
                            <input type="range" class="home-col-slider" min="120" max="520" step="10"
                                value="${homeColWidth}" title="Column width"
                                oninput="onHomeSlider(this.value)">
                            <button class="refresh-btn" onclick="loadHome(false)">Refresh</button>
                        </div>
                    </div>
                    <div class="home-masonry" data-id="home-masonry">${colDivs}</div>
                    <div class="home-load-more-wrap" ${hasMore ? '' : 'style="display:none"'}>
                        <button id="home-load-more" class="refresh-btn" onclick="loadHomeMore()">Load more</button>
                    </div>`;

                appendHomeItems(pane.querySelector('[data-id="home-masonry"]'), data.content || []);
            } catch (e) {
                pane.innerHTML = `<div class="error">Failed to load home: ${esc(e.message)}</div>`;
            }
        }

        async function loadHomeMore() {
            if (homeLoading) return;
            homeLoading = true;
            const btn = document.getElementById('home-load-more');
            if (btn) btn.textContent = 'Loading…';
            try {
                const page = Math.floor(homeOffset / HOME_PAGE_SIZE) + 1;
                const params = new URLSearchParams({ sort_by: 'created_at', sort_dir: 'desc', page, per_page: HOME_PAGE_SIZE });
                const data = await fetch(`/content?${params}`).then(r => r.json());
                const masonry = document.querySelector('[data-id="home-masonry"]');
                if (masonry) appendHomeItems(masonry, data.content || []);
                homeOffset += (data.content || []).length;
                if (btn) {
                    if (homeOffset >= data.total_count) btn.parentElement.style.display = 'none';
                    else btn.textContent = 'Load more';
                }
            } catch (e) {
                if (btn) btn.textContent = 'Load more';
            }
            homeLoading = false;
        }

        const RESET_FILES_KEY = 'curator.resetFiles';

        async function loadSettings(silent = false) {
            // Tab navigation (not a silent refresh) always resets the checkbox
            if (!silent) sessionStorage.removeItem(RESET_FILES_KEY);
            const pane = document.getElementById('settings');
            if (!silent) pane.innerHTML = '<div class="loading">Loading…</div>';
            try {
                const [proc, stats, backupInfo] = await Promise.all([
                    fetch('/processing/status').then(r => r.json()),
                    fetch('/links/stats').then(r => r.json()),
                    fetch('/backup/list').then(r => r.json()),
                ]);
                renderSettings(proc, stats, silent);
                renderBackupInfo(backupInfo, silent);
                loadIgnoredDomains();
            } catch (e) {
                if (!silent) pane.innerHTML = `<div class="error">Failed to load settings: ${esc(e.message)}</div>`;
            }
        }

        function renderSettings(proc, stats, silent = false) {
            const pane = document.getElementById('settings');

            // On silent refresh only update the values that change — never touch inputs.
            if (silent && pane.querySelector('[data-id="settings-rendered"]')) {
                const toggle = document.getElementById('settings-processing-toggle');
                if (toggle && document.activeElement !== toggle) toggle.checked = proc.processing_enabled;
                const el = id => pane.querySelector(`[data-id="${id}"]`);
                if (el('stats-total'))       el('stats-total').textContent       = stats.total ?? 0;
                if (el('stats-unprocessed')) el('stats-unprocessed').textContent = stats.unprocessed ?? 0;
                if (el('stats-processed'))   el('stats-processed').textContent   = stats.processed ?? 0;
                return;
            }

            pane.innerHTML = `
                <div data-id="settings-rendered" style="display:none"></div>
                <div class="section-header" style="margin-bottom:20px">
                    <h2>Settings</h2>
                </div>
                <div class="settings-grid">

                    <!-- Processing -->
                    <div class="settings-card">
                        <h3>Processing</h3>
                        <div class="setting-row">
                            <div>
                                <div class="setting-label">Enable processing</div>
                                <div class="setting-desc">Download and process queued links</div>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="settings-processing-toggle" ${proc.processing_enabled ? 'checked' : ''}>
                                <span class="toggle-track"></span>
                            </label>
                        </div>
                        <div class="setting-row" style="margin-top:10px;color:#6b7280;font-size:12px;justify-content:flex-start;gap:18px">

                            <span>Unprocessed: <strong style="color:#111" data-id="stats-unprocessed">${stats.unprocessed ?? 0}</strong></span>
                            <span>Processed: <strong style="color:#111" data-id="stats-processed">${stats.processed ?? 0}</strong></span>
                        </div>
                        <div id="settings-proc-msg" class="settings-msg"></div>
                    </div>


                    <!-- Backup -->
                    <div class="settings-card">
                        <h3>Backup</h3>
                        <div id="settings-backup-info" style="font-size:12px;color:#6b7280;margin-bottom:14px">Loading…</div>
                        <div class="field-group" style="margin-bottom:14px">
                            <label style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;display:flex;flex-direction:column;gap:4px">
                                Keep (max backups)
                                <input type="number" id="backup-max" min="1" max="100" value="5"
                                    style="border:1px solid #d1d5db;border-radius:5px;padding:6px 10px;font-size:13px;width:80px">

                                    <select id="backup-schedule-preset" onchange="onBackupPreset(this.value)"
                                        style="border:1px solid #d1d5db;border-radius:5px;padding:6px 10px;font-size:13px;background:white">
                                        <option value="0">Manual only</option>
                                        <option value="1440">Daily</option>
                                        <option value="10080">Weekly</option>
                                        <option value="43200">Monthly</option>
                                        <option value="custom">Custom…</option>
                                    </select>
                                    <input type="number" id="backup-schedule-minutes" min="0" placeholder="minutes"
                                        style="border:1px solid #d1d5db;border-radius:5px;padding:6px 10px;font-size:13px;width:90px;display:none">
                                </div>
                            </label>
                        </div>
                        <div style="display:flex;gap:8px">
                            <button class="btn-settings" onclick="saveBackupSettings()">Save Settings</button>
                            <button class="btn-settings btn-settings-primary" id="settings-backup-btn" onclick="settingsBackup()">Backup Now</button>
                        </div>
                        <div id="settings-backup-msg" class="settings-msg"></div>
                    </div>

                    <!-- Ignored Domains -->
                    <div class="settings-card">
                        <h3>Ignored Domains</h3>
                        <p style="font-size:13px;color:#6b7280;margin-bottom:12px">Links from these domains are excluded from the extension's batch save list.</p>
                        <div id="settings-ignored-list" style="margin-bottom:12px;max-height:180px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:6px;padding:4px 8px"></div>
                        <div style="display:flex;gap:8px">
                            <input type="text" id="settings-ignored-input" placeholder="example.com"
                                style="flex:1;border:1px solid #d1d5db;border-radius:5px;padding:6px 10px;font-size:13px;"
                                onkeydown="if(event.key==='Enter') addIgnoredDomain()">
                            <button class="btn-settings btn-settings-primary" onclick="addIgnoredDomain()">Add</button>
                        </div>
                        <div id="settings-ignored-msg" class="settings-msg"></div>
                    </div>

                    <!-- Danger zone -->
                    <div class="settings-card settings-card--danger">
                        <h3>Danger Zone</h3>
                        <p style="font-size:13px;color:#6b7280;margin-bottom:10px">
                            Permanently removes data from the selected tables. This cannot be undone.
                        </p>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:12px">
                            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                                <input type="checkbox" id="reset-links" checked style="width:15px;height:15px;"> Links

                                <input type="checkbox" id="reset-content" checked style="width:15px;height:15px;"> Content
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                                <input type="checkbox" id="reset-subscriptions" checked style="width:15px;height:15px;"> Subscriptions
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                                <input type="checkbox" id="reset-sources" style="width:15px;height:15px;"> Sources
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                                <input type="checkbox" id="reset-creators" checked style="width:15px;height:15px;"> Creators
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                                <input type="checkbox" id="reset-tags" checked style="width:15px;height:15px;"> Tags
                            </label>
                        </div>
                        <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:14px;cursor:pointer;">
                            <input type="checkbox" id="settings-reset-files" style="width:15px;height:15px;">
                            Also delete all downloaded files from the storage directory
                        </label>
                        <button class="btn-danger" id="settings-reset-btn" onclick="settingsReset()">Delete Selected</button>
                    </div>

                </div>`;

            document.getElementById('settings-processing-toggle').addEventListener('change', async function() {
                this.disabled = true;
                try {
                    const r = await fetch('/processing/toggle', { method: 'POST' });
                    const data = await r.json();
                    settingsMsg('settings-proc-msg', data.message || (data.processing_enabled ? 'Processing enabled' : 'Processing disabled'), 'ok');
                } catch (e) {
                    this.checked = !this.checked;
                    settingsMsg('settings-proc-msg', `Error: ${e.message}`, 'err');
                } finally {
                    this.disabled = false;
                }
            });

            // Restore delete-files checkbox from sessionStorage (survives page refresh,
            // cleared on explicit tab navigation so it always starts unchecked)
            const filesBox = document.getElementById('settings-reset-files');
            filesBox.checked = sessionStorage.getItem(RESET_FILES_KEY) === 'true';
            filesBox.addEventListener('change', () => {
                sessionStorage.setItem(RESET_FILES_KEY, filesBox.checked);
            });
        }


        const SCHEDULE_PRESETS = new Map([
            [0, '0'], [1440, '1440'], [10080, '10080'], [43200, '43200'],
        ]);

        function renderBackupInfo(info, silent = false) {
            const el = document.getElementById('settings-backup-info');
            if (!el) return;
            const last = info.last_backup_at ? fmtDate(info.last_backup_at) : 'Never';
            const filename = info.last_backup_path ? info.last_backup_path.split('/').pop() : '';
            el.innerHTML = `
                <div style="display:flex;flex-direction:column;gap:3px">
                    <span>Last backup: <strong style="color:#111">${last}</strong>${filename ? ` <span style="color:#9ca3af">(${esc(filename)})</span>` : ''}</span>
                    <span>Stored: <strong style="color:#111">${info.backup_count ?? '—'}</strong> / <strong style="color:#111">${info.max_backups}</strong> kept</span>
                </div>`;
            if (!silent) {
                const maxEl = document.getElementById('backup-max');
                if (maxEl) maxEl.value = info.max_backups;
                const mins = info.schedule_minutes || 0;
                const presetEl = document.getElementById('backup-schedule-preset');
                const customEl = document.getElementById('backup-schedule-minutes');
                if (presetEl && customEl) {
                    if (SCHEDULE_PRESETS.has(mins)) {
                        presetEl.value = String(mins);
                        customEl.style.display = 'none';
                    } else {
                        presetEl.value = 'custom';
                        customEl.style.display = '';
                        customEl.value = mins;
                    }
                }
            }
        }

        function onBackupPreset(val) {
            const customEl = document.getElementById('backup-schedule-minutes');
            if (!customEl) return;
            customEl.style.display = val === 'custom' ? '' : 'none';
            if (val !== 'custom') customEl.value = '';
        }

        async function saveBackupSettings() {
            const maxEl = document.getElementById('backup-max');
            const presetEl = document.getElementById('backup-schedule-preset');
            const customEl = document.getElementById('backup-schedule-minutes');
            const max_backups = parseInt(maxEl?.value) || 5;
            let schedule_minutes = 0;
            if (presetEl?.value === 'custom') {
                schedule_minutes = parseInt(customEl?.value) || 0;
            } else {
                schedule_minutes = parseInt(presetEl?.value) || 0;
            }
            try {
                const r = await fetch('/backup/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ max_backups, schedule_minutes }),
                });
                const data = await r.json();
                if (data.ok) settingsMsg('settings-backup-msg', '✓ Settings saved', 'ok');
                else settingsMsg('settings-backup-msg', data.error || 'Failed', 'err');
            } catch (e) {
                settingsMsg('settings-backup-msg', `Error: ${e.message}`, 'err');
            }
        }

        async function settingsBackup() {
            const btn = document.getElementById('settings-backup-btn');
            btn.disabled = true;
            btn.textContent = 'Creating…';
            try {
                const r = await fetch('/backup', { method: 'POST' });
                const data = await r.json();
                if (data.error) {
                    settingsMsg('settings-backup-msg', `Error: ${data.error}`, 'err');
                } else {
                    settingsMsg('settings-backup-msg', `✓ Saved to ${data.path}`, 'ok');
                    // Refresh backup info display
                    fetch('/backup/list').then(r => r.json()).then(info => renderBackupInfo(info, false));
                }
            } catch (e) {
                settingsMsg('settings-backup-msg', `Error: ${e.message}`, 'err');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Backup Now';
            }
        }

        const RESET_TABLES = [
            { id: 'reset-links',         param: 'clear_links',         label: 'Links' },
            { id: 'reset-content',        param: 'clear_content',       label: 'Content' },
            { id: 'reset-subscriptions',  param: 'clear_subscriptions', label: 'Subscriptions' },
            { id: 'reset-sources',        param: 'clear_sources',       label: 'Sources' },
            { id: 'reset-creators',       param: 'clear_creators',      label: 'Creators' },
            { id: 'reset-tags',           param: 'clear_tags',          label: 'Tags' },
        ];

        async function settingsReset() {
            const deleteFiles = document.getElementById('settings-reset-files').checked;
            const selected = RESET_TABLES.filter(t => document.getElementById(t.id).checked);
            if (selected.length === 0 && !deleteFiles) {
                showToast(['Nothing selected.']);
                return;
            }
            const tableList = selected.map(t => t.label).join(', ');
            const fileWarning = deleteFiles ? '\n\nThis will also permanently delete ALL downloaded files.' : '';
            const tableWarning = selected.length ? `tables: ${tableList}` : 'no tables';
            if (!confirm(`This will permanently remove all data from ${tableWarning}.${fileWarning}\n\nThis cannot be undone. Continue?`)) return;

            const btn = document.getElementById('settings-reset-btn');
            btn.disabled = true;
            try {
                const qs = new URLSearchParams();
                for (const t of RESET_TABLES) qs.set(t.param, document.getElementById(t.id).checked ? 'true' : 'false');
                if (deleteFiles) qs.set('delete_files', 'true');
                const r = await fetch('/debug/reset?' + qs.toString(), { method: 'POST' });
                const data = await r.json();
                const rows = [
                    { label: 'Links',         val: data.links_deleted },
                    { label: 'Content',       val: data.content_deleted },
                    { label: 'Subscriptions', val: data.subscriptions_deleted },
                    { label: 'Sources',       val: data.sources_deleted },
                    { label: 'Creators',      val: data.creators_deleted },
                    { label: 'Tags',          val: data.tags_deleted },
                    { label: 'Files',         val: data.files_deleted },
                ].filter(r => r.val > 0);
                const lines = rows.length
                    ? ['Deleted:', ...rows.map(r => `  ${r.label}: ${r.val.toLocaleString()}`)]
                    : ['Nothing was deleted.'];
                if (data.files_error) lines.push(`File error: ${data.files_error}`);
                showToast(lines);
                loadSettings(true);
            } catch (e) {
                showToast([`Error: ${e.message}`]);
            } finally {
                btn.disabled = false;
            }
        }

        // ── Ignored Domains ───────────────────────────────────────────────────
        async function loadIgnoredDomains() {
            const list = document.getElementById('settings-ignored-list');
            if (!list) return;
            try {
                const data = await fetch('/ignored-domains').then(r => r.json());
                const domains = data.domains || [];
                if (domains.length === 0) {
                    list.innerHTML = '<div style="font-size:13px;color:#9ca3af">No ignored domains.</div>';
                } else {
                    list.innerHTML = domains.map(d => `
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:13px">
                            <span>${esc(d.domain)}</span>
                            <button onclick="removeIgnoredDomain('${esc(d.domain)}')"
                                style="background:none;border:none;cursor:pointer;color:#dc2626;font-size:18px;line-height:1;padding:0 2px"
                                title="Remove">×</button>
                        </div>`).join('');
                }
            } catch (e) {
                settingsMsg('settings-ignored-msg', `Error: ${e.message}`, 'err');
            }
        }

        async function addIgnoredDomain() {
            const input = document.getElementById('settings-ignored-input');
            let raw = input.value.trim();
            if (!raw) return;
            try { raw = new URL(raw.includes('://') ? raw : `https://${raw}`).hostname; } catch {}
            try {
                const r = await fetch('/ignored-domains', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domain: raw }),
                });
                const data = await r.json();
                if (data.ok) {
                    input.value = '';
                    loadIgnoredDomains();
                } else {
                    settingsMsg('settings-ignored-msg', data.error || 'Failed', 'err');
                }
            } catch (e) {
                settingsMsg('settings-ignored-msg', `Error: ${e.message}`, 'err');
            }
        }

        async function removeIgnoredDomain(domain) {
            try {
                const r = await fetch(`/ignored-domains/${encodeURIComponent(domain)}`, { method: 'DELETE' });
                const data = await r.json();
                if (data.ok) loadIgnoredDomains();
                else settingsMsg('settings-ignored-msg', data.error || 'Failed', 'err');
            } catch (e) {
                settingsMsg('settings-ignored-msg', `Error: ${e.message}`, 'err');
            }
        }

        // ── Toast ──────────────────────────────────────────────────────────────
        let _toastTimer = null;
        function showToast(lines, durationMs = 6000) {
            const el = document.getElementById('toast');
            el.textContent = lines.join('\n');
            el.classList.add('show');
            clearTimeout(_toastTimer);
            _toastTimer = setTimeout(() => el.classList.remove('show'), durationMs);
        }

        loadHome();
        startRefresh();
    </script>
    <div id="toast"></div>
</body>
</html>
